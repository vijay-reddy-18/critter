# =============================================
# Test Datasource: H2 In-Memory Database
# =============================================
spring.datasource.url=jdbc:h2:mem:critter-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================
# JPA / Hibernate Settings for Tests
# =============================================
# Drop and re-create schema on each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Server port for tests
server.port=8082

# =============================================
# H2 Web Console (useful for test debugging)
# =============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
