# Server port
server.port=8082

# =============================================
# Main Datasource: PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/critter
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate Settings
# =============================================
# Automatically create/update tables based on entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in console (optional - uncomment to debug)
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# =============================================
# H2 Console (disabled for main app)
# =============================================
spring.h2.console.settings.web-allow-others=false
